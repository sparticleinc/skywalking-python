name: publish-pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source codes
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade pip "packaging>=24.2" poetry twine
      - name: Verify tag matches package version
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import sys
          import tomllib

          project = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))
          package_version = project["tool"]["poetry"]["version"]
          git_tag = os.environ["GIT_TAG"]
          expected_version = git_tag[1:] if git_tag.startswith("v") else git_tag

          if package_version != expected_version:
              print(f"Tag version {expected_version} does not match package version {package_version}.", file=sys.stderr)
              sys.exit(1)

          print(f"Verified package version {package_version} for tag {git_tag}.")
          PY
      - name: Build package distributions
        run: poetry build
      - name: Check distributions
        run: python -m twine check dist/*
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/project/sparticle-skywalking/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
