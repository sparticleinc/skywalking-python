version: '2.1'

services:
  collector:
    extends:
      service: collector
      file: ../../docker-compose.base.yml

  redis:
    image: redis:7.4-alpine
    hostname: redis
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 60s
      retries: 120
    networks:
      - beyond

  producer:
    extends:
      service: agent
      file: ../../docker-compose.base.yml
    working_dir: /app
    ports:
      - 9090:9090
    volumes:
      - .:/app
    command: ['bash', '-c', 'pip install flask && pip install -r /app/requirements.txt && sw-python run python3 -m services.producer']
    healthcheck:
      test: ["CMD", "bash", "-c", "cat < /dev/null > /dev/tcp/127.0.0.1/9090"]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
      worker:
        condition: service_healthy
    environment:
      SW_AGENT_NAME: producer
      SW_AGENT_LOGGING_LEVEL: INFO
      SW_AGENT_DISABLE_PLUGINS: sw_redis

  worker:
    extends:
      service: agent
      file: ../../docker-compose.base.yml
    working_dir: /app
    volumes:
      - .:/app
    command: ['bash', '-c', 'pip install -r /app/requirements.txt && sw-python run celery -A services.tasks worker --pool=solo -l info']
    healthcheck:
      test: ["CMD", "bash", "-c", "ps -ef | grep 'celery -A services.tasks worker' | grep -v grep"]
      interval: 5s
      timeout: 60s
      retries: 120
    depends_on:
      collector:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SW_AGENT_NAME: worker
      SW_AGENT_LOGGING_LEVEL: INFO
      SW_AGENT_DISABLE_PLUGINS: sw_redis

networks:
  beyond:
